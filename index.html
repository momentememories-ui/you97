<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แบบสอบถามวิจัย</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff5c8a;
            --secondary: #ffacc5;
            --accent: #5e3040;
            --bg: #fff5f7;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh; width: 100vw;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- BACKGROUND FLOATERS --- */
        .bg-floaters {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .floater {
            position: absolute; bottom: -50px;
            animation: floatUp linear infinite; opacity: 0.6;
        }
        @keyframes floatUp { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s; z-index: 10;
            padding: 20px; box-sizing: border-box;
        }
        .active { display: flex; }

        /* --- PAGE 1: ENVELOPE --- */
        .chase-area { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        .flying-envelope {
            position: relative; width: 140px; height: 90px;
            cursor: pointer; z-index: 20;
        }
        .env-body {
            position: relative; z-index: 2; font-size: 6rem; line-height: 1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)); text-align: center;
        }
        .wing {
            position: absolute; top: 30px; width: 70px; height: 40px;
            background: rgba(255,255,255,0.9); border: 2px solid #eec; border-radius: 50%; z-index: 1;
        }
        .wing.left { left: -15px; transform-origin: right center; animation: flapL 0.2s infinite alternate; }
        .wing.right { right: -15px; transform-origin: left center; animation: flapR 0.2s infinite alternate; }
        @keyframes flapL { from { transform: rotate(-25deg); } to { transform: rotate(35deg); } }
        @keyframes flapR { from { transform: rotate(25deg); } to { transform: rotate(-35deg); } }
        
        .music-hint {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            animation: pulse 1.5s infinite; color: var(--primary); font-weight: 300;
        }
        @keyframes pulse { 50% { opacity: 0.6; transform: scale(0.95); } }

        /* --- PAGE 2: HEART TAP --- */
        .heart-container {
            width: 220px; height: 200px; position: relative; cursor: pointer;
            transition: transform 0.1s; filter: drop-shadow(0 10px 20px rgba(255, 92, 138, 0.4));
        }
        .heart-container:active { transform: scale(0.95); }
        .tap-msg { margin-top: 25px; color: #ff5c8a; font-size: 1.2rem; animation: blink 1s infinite; text-align: center; font-weight: 400; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* --- PAGE 3: SCRATCH --- */
        .scratch-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        .scratch-box {
            position: relative; width: 300px; height: 300px;
            border: 8px solid white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden;
        }

        /* --- FINAL --- */
        .final-msg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1.2s ease-out;
        }
        .final-msg-wrapper {
            position: relative;
            max-width: 90%;
            width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .final-sticker {
            width: 280px; /* ขยายสติ๊กเกอร์ให้ใหญ่เกือบเท่ากล่องข้อความ */
            height: auto;
            z-index: 210;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
            pointer-events: none;
            margin-bottom: -20px; /* ให้เกยขอบบนกล่องข้อความเล็กน้อยพอสวยงาม ไม่บังตัวหนังสือ */
        }
        .final-msg-box {
            position: relative; z-index: 205; text-align: center; padding: 30px 25px;
            background: white; border-radius: 20px; box-shadow: 0 15px 40px rgba(255, 92, 138, 0.2);
            transform: scale(0.8) translateY(30px); opacity: 0;
            transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            box-sizing: border-box;
        }
        .final-msg-container.show-final { opacity: 1; pointer-events: auto; }
        .final-msg-container.show-final .final-msg-box { transform: scale(1) translateY(0); opacity: 1; }
        .final-msg-box p { font-size: 1.1rem; line-height: 1.8; color: #555; margin: 0; }
        .pink-highlight {
            color: var(--primary);
            font-weight: 600;
            font-size: 1.3rem;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>
<body onclick="startExperience()">

    <audio id="bgm" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <div class="bg-floaters" id="bgFloaters"></div>

    <div id="page1" class="page active">
        <div class="chase-area">
            <h2 style="text-align:center; margin-top:100px; color:var(--accent);"></h2>
            <div class="flying-envelope" id="envelope">
                <div class="wing left"></div><div class="env-body">💌</div><div class="wing right"></div>
            </div>
        </div>
        <div class="music-hint">🎵 แตะหน้าจอเพื่อเริ่ม 🎵</div>
    </div>

    <div id="page2" class="page">
        <div class="heart-container" onclick="fillHeart()">
            <svg viewBox="0 0 200 200" width="100%" height="100%">
                <defs>
                    <mask id="heartMask"><path d="M100,180 C20,130 0,80 0,50 C0,20 25,0 55,0 C75,0 90,15 100,30 C110,15 125,0 145,0 C175,0 200,20 200,50 C200,80 180,130 100,180 Z" fill="white"/></mask>
                    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" /><stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" /></linearGradient>
                </defs>
                <path d="M100,180 C20,130 0,80 0,50 C0,20 25,0 55,0 C75,0 90,15 100,30 C110,15 125,0 145,0 C175,0 200,20 200,50 C200,80 180,130 100,180 Z" fill="none" stroke="#ff5c8a" stroke-width="4" />
                <rect x="0" y="200" width="200" height="200" fill="url(#pinkGrad)" mask="url(#heartMask)" id="waterLevel"></rect>
            </svg>
            <div style="position:absolute; top:45%; width:100%; text-align:center; color:#fff; font-weight:bold;"><span id="percent">0%</span></div>
        </div>
        <p class="tap-msg"></p>
    </div>

    <div id="page3" class="page">
        <div class="scratch-title">ค่อยๆขูดรูปนะคะ</div>
        <div class="scratch-box">
            <img src="photo7.jpg" style="width:100%; height:100%; object-fit:cover;">
            <canvas id="scratchCanvas" width="300" height="300" style="position:absolute; top:0; left:0; cursor:pointer;"></canvas>
        </div>
    </div>

    <div class="final-msg-container" id="finalMsgContainer">
        <div class="final-msg-wrapper">
            <!-- ย้ายรูปไว้ข้างบนกล่องข้อความอย่างสมบูรณ์ -->
            <img src="photo2.png" class="final-sticker" alt="Sticker">
            <div class="final-msg-box">
                <p>
                    ตั้งแต่รู้จักเธอเค้ามีความสุขทู้กวันน<br>
                    เธอน่ารักกับเค้าม้ากมาก<br>
                    ถึงจาแอบดื้อไปหน่อย<br>
                    แต่เค้าจะทำให้การตัดสินใจเลือกเค้า<br>
                    เป็นเรื่องที่เธอไม่เสียใจเลย<br>
                    <span class="pink-highlight">เป็นแฟนกับเค้านะคั้บ</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        let audioPlaying = false;
        function startExperience() {
            // เล่นเพลงเมื่อแตะหน้าจอครั้งแรก
            if(!audioPlaying) {
                document.getElementById('bgm').play().catch(()=>{});
                audioPlaying = true;
            }
            // ถ้าอยู่หน้าแรก แล้วมีการแตะ ให้ข้ามไปหน้า 2 ทันที
            const page1 = document.getElementById('page1');
            if (page1.classList.contains('active')) {
                goTo('page2');
            }
        }
        
        function createFloaters(containerId, num) {
            const container = document.getElementById(containerId);
            const ems = ['🌸', '❤️', '💌', '🌹', '✨', '💖'];
            for(let i=0; i<num; i++) {
                let el = document.createElement('div');
                el.className = 'floater';
                el.innerText = ems[Math.floor(Math.random() * ems.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                el.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(el);
            }
        }
        createFloaters('bgFloaters', 20);

        function goTo(id) {
            document.querySelectorAll('.page').forEach(p => {
                p.style.opacity = 0;
                setTimeout(() => p.classList.remove('active'), 500);
            });
            setTimeout(() => {
                const p = document.getElementById(id);
                p.classList.add('active');
                p.style.opacity = 1;
                if(id==='page3') startScratch();
            }, 500);
        }

        // หน้า 2 Logic (เพิ่มทีละ 1%)
        let heartPercent = 0;
        function fillHeart() {
            heartPercent += 1; 
            if(heartPercent > 100) heartPercent = 100;
            document.getElementById('waterLevel').setAttribute('y', 200 - (200 * (heartPercent/100)));
            document.getElementById('percent').innerText = heartPercent + "%";
            if(heartPercent >= 100) setTimeout(() => goTo('page3'), 600);
        }

        // หน้า 3 Logic (ขูดถึง 99% และค้างไว้ 3 วินาที)
        let isScratchFinished = false;
        function startScratch() {
            const c = document.getElementById('scratchCanvas'); const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffacc5'; ctx.fillRect(0,0,300,300);
            
            let isDrawing = false;
            function scratch(x,y) {
                if(isScratchFinished) return;
                ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x,y,35,0,Math.PI*2); ctx.fill();
                checkScratchProgress();
            }
            function checkScratchProgress() {
                if(isScratchFinished) return;
                const d = ctx.getImageData(0,0,300,300).data;
                let cleared = 0;
                for(let i=3; i<d.length; i+=4) if(d[i]===0) cleared++;
                
                // ขูดครบ 99%
                if(cleared/(300*300) >= 0.99) { 
                    isScratchFinished = true;
                    // ค้างไว้ 3 วินาที (3000ms) ก่อนไปหน้าข้อความสุดท้าย
                    setTimeout(() => {
                        document.getElementById('finalMsgContainer').classList.add('show-final');
                    }, 3000);
                }
            }
            const move = (e) => { 
                if(!isDrawing) return; 
                const r = c.getBoundingClientRect(); 
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                scratch(clientX-r.left, clientY-r.top); 
            };
            c.addEventListener('mousedown', () => isDrawing=true);
            window.addEventListener('mouseup', () => isDrawing=false);
            c.addEventListener('mousemove', move);
            c.addEventListener('touchstart', (e) => { isDrawing=true; e.preventDefault(); });
            c.addEventListener('touchend', () => isDrawing=false);
            c.addEventListener('touchmove', move);
        }
    </script>
</body>
</html>
